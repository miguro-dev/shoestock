<!DOCTYPE html>
<html lang="es">
<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8"/>
    <meta name="description" content="Control de inventario y ventas de calzado"/>

    <link rel="stylesheet" href="/css/styles.css"/>
    <script src="/js/cargar-historial.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main>
        <h1>Historial de Ventas</h1>
        <section>
            <article>
                <p>Ventas totales (hoy): $0.00</p>
            </article>
            <article>
                <p>Utilidad neta: $0.00</p>
            </article>
            <article>
                <p>Devoluciones: 0</p>
            </article>
        </section>
        <section>
            <h3>Cronología de Ventas</h3>
            <table class="table-section">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Vendedor</th>
                        <th>Descuento</th>
                        <th>Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
