<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script type="module" src="/js/logica-inventario.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html" class="active">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main>
        <h1>Inventario</h1>

        <section>
            <div>
                <form class="generic-form">
                    <input type="text" name="codigo" placeholder="Código único" required><br>
                    <input type="text" name="nombre" placeholder="Nombre del modelo" required><br>
                    <select name="categoria" id="categoria" required>
                        <option value="Deportivo">Deportivo</option>
                        <option value="Casual">Casual</option>
                        <option value="Formal">Formal</option>
                        <option value="Botín">Botín</option>
                    </select><br>
                    <input type="number" name="precioCompra" placeholder="Precio de compra" required><br>
                    <input type="number" name="precioVenta" placeholder="Precio de venta" required><br>
                    <input type="number" name="stock" placeholder="Cantidad en stock" required><br>
                    <button type="submit" id="guardar-inventario">Guardar</button>
                </form>
            </div>

            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio de Compra</th>
                            <th>Precio de Venta</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan el inventario dinamicamente -->
                    </tbody>
                </table>
            </div>

        </section>

    </main>
</body>

</html>
