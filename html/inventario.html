<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/cargar-inventario.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main>
        <h1>Inventario</h1>

        <section>
            <div>
                <form class="generic-form">
                    <input type="text" placeholder="Código único"><br>
                    <input type="text" placeholder="Nombre del modelo"><br>
                    <select name="categoria" id="categoria">
                        <option value="deportivo">Deportivo</option>
                        <option value="casual">Casual</option>
                        <option value="formal">Formal</option>
                        <option value="botin">Botín</option>
                    </select><br>
                    <input type="number" placeholder="Precio de compra"><br>
                    <input type="number" placeholder="Precio de venta"><br>
                    <input type="number" placeholder="Cantidad en stock"><br>
                    <button type="submit">Guardar</button>
                </form>
            </div>

            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio de Compra</th>
                            <th>Precio de Venta</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan el inventario dinamicamente -->
                    </tbody>
                </table>
            </div>

        </section>

    </main>
</body>

</html>
