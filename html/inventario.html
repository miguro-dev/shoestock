<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script type="module" src="/js/logica-inventario.js"></script>
</head>

<body>
    <header>
        <h1>ShoeStock</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html" class="active">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>

        <span>Admin</span>
    </header>

    <main>
        <section>
            <h1>Productos en Inventario</h1>
            <p>Gestioná el stock y los precios de todos los productos</p>

            <div class="config-toolbar">
                <form role="search">
                    <div class="search-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="10" cy="10" r="7" />
                            <path d="M21 21l-6-6" />
                        </svg>
                        <input type="search" placeholder="Buscar producto">
                        <button class="btn-primary" disabled type="submit">Buscar</button>
                    </div>
                </form>

                <button class="btn-add" id="btnAddProduct">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16.5 9.4 7.55 4.24" />
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        <path d="M3.29 7 12 12l8.71-5" />
                        <path d="M12 22V12" />
                    </svg>
                    Añadir Producto
                </button>
            </div>

            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio de Compra</th>
                            <th>Precio de Venta</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan el inventario dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16.5 9.4 7.55 4.24" />
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        <path d="M3.29 7 12 12l8.71-5" />
                        <path d="M12 22V12" />
                    </svg>
                    <h3>Nuevo Producto</h3>
                </div>
                <button class="modal-close" id="modalClose">X</button>
            </div>
            <form class="config-form" id="modalForm">
                <div class="form-group">
                    <label for="codigo">Código único</label>
                    <input type="text" id="codigo" name="codigo" placeholder="ej: ZAP-001" required>
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre del modelo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="ej: Nike Air Max" required>
                </div>
                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" name="categoria" required>
                        <option value="Deportivo">Deportivo</option>
                        <option value="Casual">Casual</option>
                        <option value="Formal">Formal</option>
                        <option value="Botín">Botín</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="precioCompra">Precio de compra</label>
                    <input type="number" id="precioCompra" name="precioCompra" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="precioVenta">Precio de venta</label>
                    <input type="number" id="precioVenta" name="precioVenta" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="stock">Cantidad en stock</label>
                    <input type="number" id="stock" name="stock" placeholder="0" required>
                </div>
                <button type="submit" class="btn-primary">
                    Guardar
                </button>
            </form>
        </div>
    </div>
</body>

</html>
