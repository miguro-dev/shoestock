<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/cargar-usuarios.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main>
        <h1>Panel de Control</h1>

        <section>
            <h2>Usuarios y Roles</h2>

            <div>
                <form class="generic-form">
                    <input type="number" placeholder="Id"><br>
                    <input type="text" placeholder="Nombre de usuario"><br>
                    <select name="rol" id="rol">
                        <option value="vendedor">Vendedor</option>
                        <option value="administrador">Administrador</option>
                    </select><br>
                    <button type="submit">Guardar</button>
                </form>
            </div>

            <div>
                <table class="table-section">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Usuario</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

        </section>
    </main>
</body>

</html>
