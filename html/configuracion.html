<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script type="module" src="/js/logica-configuracion.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html" class="active">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>

    <main>
        <section>

            <h1>Usuarios del Sistema</h1>

            <p>Gestioná los accesos y roles del personal</p>

            <div class="config-toolbar">
                <form role="search">
                    <div class="search-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="10" cy="10" r="7" />
                            <path d="M21 21l-6-6" />
                        </svg>

                        <input type="text" placeholder="Buscar usuario">

                        <button class="btn-primary" disabled type="submit">Buscar</button>
                    </div>
                </form>

                <button class="btn-add" id="btnAddUser">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0-8 0" />
                        <path d="M16 19h6" />
                        <path d="M19 16v6" />
                        <path d="M6 21v-2a4 4 0 0 1 4-4h4" />
                    </svg>
                    Añadir Usuario
                </button>
            </div>

            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Usuario</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan los usuarios dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0-8 0" />
                        <path d="M16 19h6" />
                        <path d="M19 16v6" />
                        <path d="M6 21v-2a4 4 0 0 1 4-4h4" />
                    </svg>
                    <h3>Nuevo Usuario</h3>
                </div>
                <button class="modal-close" id="modalClose">X</button>
            </div>
            <form class="config-form" id="modalForm">
                <div class="form-group">
                    <label for="user-id">ID</label>
                    <input type="number" id="user-id" name="userId" placeholder="001" required>
                </div>
                <div class="form-group">
                    <label for="user-name">Nombre de usuario</label>
                    <input type="text" id="user-name" name="userName" placeholder="ej: jperez" required>
                </div>
                <div class="form-group">
                    <label for="user-rol">Rol</label>
                    <select id="user-rol" name="userRol">
                        <option value="vendedor">Vendedor</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">
                    Guardar
                </button>
            </form>
        </div>
    </div>
</body>

</html>
