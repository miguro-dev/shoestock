<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/cargar-ventas.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main>
        <section>
            <h1>Realizar Venta</h1>
            <input type="text" placeholder="Buscar producto por id">
            <table class="table-section">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>

        <section>
            <div>
                <p>Subtotal: $180.00</p>
                <p>Descuento: $18.00</p>
                <p>Total: $162.00</p>
            </div>

            <div>
                <button>Registrar Venta</button>
                <button>Limpiar</button>
                <button>Imprimir Recibo</button>
            </div>

            <label for="comentarios">Comentarios:</label>
            <textarea name="comentarios" id="comentarios" placeholder="Ej: Empaque de regalo"></textarea>
        </section>
    </main>
</body>

</html>
