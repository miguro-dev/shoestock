<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/cargar-productos.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html" class="active">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main class="two-columns">
        <section>
            <h1>Realizar Venta</h1>
            <p>Selecciona un producto para agregarlo a la venta</p>

            <form role="search">
                <div class="search-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="10" cy="10" r="7" />
                        <path d="M21 21l-6-6" />
                    </svg>

                    <input type="text" placeholder="Buscar producto">

                    <button class="btn-primary" disabled type="submit">Buscar</button>
                </div>
            </form>
            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan los produtos dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h3>Detalles de venta</h3>
            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan los productos seleccionados para la venta -->
                    </tbody>
                </table>
            </div>
            <div class="sub-total-card">
                <span>Total: $0</span>
            </div>

            <div>
                <button class="btn-primary" disabled>Registrar Venta</button>
            </div>
        </section>
    </main>
</body>

</html>
