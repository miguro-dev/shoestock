<!DOCTYPE html>
<html lang="es">

<head>
    <title>ShoeStock</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Control de inventario y ventas de calzado" />

    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/cargar-productos.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">ShoeStock</a>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
            <a href="ventas.html" class="active">Ventas</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Historial</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="header-right">
            <span class="user-badge">Admin</span>
        </div>
    </header>
    <main class="two-columns">
        <section>
            <h2>Realizar Venta</h2>
            <form role="search" class="generic-form">
                <input type="text" placeholder="Buscar producto por id">
                <button type="submit">Buscar</button>
            </form>
            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan los produtos dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h2>Detalles de venta</h2>
            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aqui se cargan los productos seleccionados para la venta -->
                    </tbody>
                </table>
            </div>
            <div class="sub-total-card">
                <span>Total: $0.00</span>
            </div>

            <div>
                <button>Registrar Venta</button>
                <button>Limpiar</button>
                <button>Imprimir Recibo</button>
            </div>

            <label for="comentarios">Comentarios:</label>
            <textarea name="comentarios" id="comentarios" placeholder="Ej: Empaque de regalo"></textarea>
        </section>
    </main>
</body>

</html>
